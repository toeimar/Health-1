<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BizFlow - Enterprise Accounting</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 🌙 Dark Theme (Default) */
            --bg: #09090b; --surface: #13141a; --card: #1c1d26; --border: #2f3342;
            --accent: #0ea5e9; --accentSoft: #0ea5e920; --accentHover: #38bdf8;
            --green: #10b981; --greenSoft: #10b98118;
            --yellow: #f59e0b; --yellowSoft: #f59e0b18;
            --teal: #0d9488; --tealSoft: #0d948818; 
            --orange: #f97316; --orangeSoft: #f9731618;
            --purple: #8b5cf6; --purpleSoft: #8b5cf618;
            --red: #f43f5e; --redSoft: #f43f5e18;
            --text: #f8fafc; --muted: #94a3b8; --subtle: #334155;
            --pdf-bg: #525659;
        }
        body.light-mode {
            /* ☀️ Light Theme */
            --bg: #f8fafc; --surface: #ffffff; --card: #ffffff; --border: #e2e8f0;
            --text: #0f172a; --muted: #64748b; --subtle: #f1f5f9;
            --pdf-bg: #e2e8f0;
            --accentSoft: #e0f2fe; --greenSoft: #dcfce7; --yellowSoft: #fef3c7; 
            --tealSoft: #ccfbf1; --orangeSoft: #ffedd5; --purpleSoft: #ede9fe; --redSoft: #ffe4e6;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:'DM Sans', 'Sarabun', sans-serif; overflow-x: hidden; transition: background 0.3s, color 0.3s; }
        ::-webkit-scrollbar { width:6px; height:6px; }
        ::-webkit-scrollbar-track { background:var(--surface); }
        ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

        /* App Layout */
        .app-container { display:flex; height:100vh; overflow:hidden; position: relative; }
        .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:90; backdrop-filter:blur(2px); opacity:0; transition:opacity 0.3s; }
        .sidebar-overlay.active { display:block; opacity:1; }

        .sidebar { width:240px; min-width:240px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; z-index:100; transition: transform 0.3s ease, background 0.3s; }
        .sidebar-logo { padding:24px 20px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
        .logo-mark { font-family:'Syne', sans-serif; font-weight:800; font-size:22px; background:linear-gradient(135deg, #0ea5e9, #6366f1); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .logo-sub { font-size:10px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-top:2px; }
        .mobile-close-menu { display:none; background:none; border:none; color:var(--text); font-size:24px; cursor:pointer; }
        
        .nav-list { padding:12px 0; flex:1; overflow-y:auto; }
        .nav-item { display:flex; align-items:center; gap:12px; padding:12px 20px; cursor:pointer; font-size:14px; color:var(--muted); transition:all .15s; border-left:3px solid transparent; }
        .nav-item:hover { color:var(--text); background:var(--card); }
        .nav-item.active { color:var(--accentHover); background:var(--accentSoft); border-left-color:var(--accent); font-weight:500; }
        .nav-icon { font-size:16px; opacity:.7; width:20px; text-align:center; }
        .notif-dot { width:6px; height:6px; border-radius:50%; background:var(--red); display:inline-block; margin-left:auto; }
        
        .sidebar-footer { padding:16px 20px; border-top:1px solid var(--border); display:flex; align-items:center; gap:12px; }
        .avatar { width:36px; height:36px; border-radius:10px; background:var(--card); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; }
        .avatar img { width:100%; height:100%; object-fit:contain; display:none; }
        .avatar span { font-size:14px; font-weight:700; color:var(--accent); font-family:'Syne', sans-serif; }
        .user-info { flex:1; overflow:hidden; display:flex; align-items:center; justify-content:space-between; }
        .theme-btn { background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer; padding:4px; border-radius:6px; transition:all 0.2s; }
        .theme-btn:hover { background:var(--subtle); color:var(--text); }

        .main-view { flex:1; display:flex; flex-direction:column; overflow:hidden; width:100%; }
        .topbar { height:64px; min-height:64px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 24px; gap:16px; transition:background 0.3s; }
        .menu-toggle { display:none; background:none; border:none; color:var(--text); font-size:24px; cursor:pointer; margin-right:12px; }
        .page-title { font-family:'Syne', sans-serif; font-size:18px; font-weight:700; white-space:nowrap; text-overflow:ellipsis; overflow:hidden; }
        .content { flex:1; overflow-y:auto; padding:24px; -webkit-overflow-scrolling: touch; }

        /* General UI */
        .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:10px 16px; border-radius:8px; border:none; font-size:13px; font-weight:500; cursor:pointer; transition:all .15s; font-family:inherit; white-space:nowrap; }
        .btn-sm { padding:6px 12px; font-size:12px; border-radius:6px; }
        .btn-primary { background:var(--accent); color:#fff; }
        .btn-primary:hover { background:var(--accentHover); }
        .btn-success { background:var(--green); color:#fff; }
        .btn-teal { background:var(--teal); color:#fff; }
        .btn-teal:hover { opacity: 0.9; }
        .btn-danger { background:var(--red); color:#fff; }
        .btn-purple { background:var(--purple); color:#fff; }
        .btn-ghost { background:transparent; color:var(--text); border:1px solid var(--border); }
        .btn-ghost:hover { background:var(--surface); border-color:var(--muted); }
        
        .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:24px; margin-bottom:20px; transition:all .2s; }
        .grid-4 { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:16px; margin-bottom:24px; }
        .grid-2 { display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:16px; margin-bottom:24px; }
        .grid-3 { display:grid; grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap:16px; margin-bottom:24px; }
        .section-title { font-family:'Syne', sans-serif; font-size:15px; font-weight:600; color:var(--text); margin-bottom:16px; display:block; }
        
        .form-group { margin-bottom:16px; display:flex; flex-direction:column; gap:8px; }
        .form-group label { font-size:12px; color:var(--muted); font-weight:500; }
        .form-control { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px 12px; color:var(--text); font-family:inherit; font-size:14px; outline:none; transition:border-color .15s; }
        .form-control:focus { border-color:var(--accent); }
        .form-control:disabled { opacity:0.6; cursor:not-allowed; }
        
        .table-wrap { background:var(--card); border:1px solid var(--border); border-radius:12px; overflow-x:auto; margin-bottom:24px; -webkit-overflow-scrolling:touch; }
        .table-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border); min-width:600px; }
        table { width:100%; border-collapse:collapse; min-width:600px; }
        th { text-align:left; padding:14px 20px; font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); border-bottom:1px solid var(--border); font-weight:600; white-space:nowrap; }
        td { padding:14px 20px; font-size:14px; border-bottom:1px solid var(--border); }
        tr:last-child td { border-bottom:none; }
        tr:hover td { background:var(--surface); }

        .badge { display:inline-flex; align-items:center; justify-content:center; padding:4px 10px; border-radius:6px; font-size:11px; font-weight:600; letter-spacing:.4px; }
        .bg-green { background:var(--greenSoft); color:var(--green); }
        .bg-yellow { background:var(--yellowSoft); color:var(--yellow); }
        .bg-teal { background:var(--tealSoft); color:var(--teal); }
        .bg-purple { background:var(--purpleSoft); color:var(--purple); }
        .bg-red { background:var(--redSoft); color:var(--red); }
        .bg-gray { background:var(--subtle); color:var(--muted); }

        .kpi-label { font-size:12px; color:var(--muted); margin-bottom:8px; font-weight:500; }
        .kpi-value { font-family:'Syne', sans-serif; font-size:24px; font-weight:700; color:var(--text); line-height:1; }
        .kpi-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; margin-bottom:16px; }
        
        .empty { text-align:center; padding:60px 20px; color:var(--muted); }
        .empty-icon { font-size:40px; margin-bottom:16px; opacity:.3; }

        /* Forms Layout */
        .line-item-row { display:flex; gap:10px; margin-bottom:10px; align-items:center; background:var(--surface); padding:10px; border-radius:8px; border:1px solid var(--border); flex-wrap:wrap; }
        .line-item-row .sel { flex:1; min-width:200px; }
        .line-item-row .txt { flex:2; min-width:200px; }
        .line-item-row .num { width:80px; text-align:center; }
        .line-item-row .price { width:100px; text-align:right; }
        .line-item-row .discount { width:80px; text-align:right; }
        .line-item-row .total { width:100px; text-align:right; font-weight:600; font-size:13px; }
        
        /* Modals & Toasts */
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:none; align-items:center; justify-content:center; z-index:1000; backdrop-filter:blur(3px); }
        .modal-overlay.active { display:flex; animation:fadeIn 0.2s ease; }
        .modal-box { background:var(--card); border:1px solid var(--border); border-radius:16px; width:90%; max-width:500px; padding:24px; box-shadow:0 10px 40px rgba(0,0,0,0.5); max-height:90vh; display:flex; flex-direction:column; }
        .modal-box.modal-lg { max-width:900px; background: var(--pdf-bg); padding: 0; } 
        .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; font-size:18px; font-weight:600; font-family:'Syne', sans-serif; flex-shrink:0; color:var(--text); }
        .modal-lg .modal-header { padding: 16px 24px; margin-bottom: 0; background: var(--card); border-bottom: 1px solid var(--border); border-radius: 16px 16px 0 0; }
        .modal-close { cursor:pointer; color:var(--muted); font-size:24px; background:none; border:none; padding:4px; }
        .modal-body { overflow-y:auto; flex:1; -webkit-overflow-scrolling:touch; }
        .modal-lg .modal-body { padding: 30px 20px; display: flex; flex-direction:column; align-items: center; gap:30px; }

        .toast-container { position:fixed; bottom:24px; right:24px; z-index:9999; display:flex; flex-direction:column; gap:10px; }
        .toast { background:var(--card); border:1px solid var(--border); border-left:4px solid var(--green); padding:16px 24px; border-radius:10px; box-shadow:0 10px 25px rgba(0,0,0,0.4); display:flex; align-items:center; gap:12px; animation:slideIn 0.3s ease; color:var(--text); font-size:14px; font-weight:500; }
        
        @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
        @keyframes slideIn { from{transform:translateX(100%); opacity:0;} to{transform:translateX(0); opacity:1;} }
        .fade-up { animation:fadeUp .3s ease both; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

        /* 📄 TRUE A4 DOCUMENT STYLE (Perfect Fit) */
        .a4-wrapper { display: flex; flex-direction: column; gap: 30px; width: 100%; align-items: center; transform-origin: top center; }
        .a4-page { 
            width: 210mm; 
            height: 297mm; /* บังคับความสูงคงที่ A4 พอดี */
            background: #ffffff; 
            color: #111111; 
            padding: 15mm 20mm; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            font-family: 'Sarabun', sans-serif; 
            position: relative; 
            flex-shrink: 0; 
            overflow: hidden; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column; /* เพื่อให้ใช้ flex-grow ดันลายเซ็นลงล่าง */
        }
        
        .tri-teal { position: absolute; top: 0; right: 0; border-style: solid; border-width: 0 150px 150px 0; border-color: transparent var(--teal) transparent transparent; z-index: 1; }
        .tri-blue { position: absolute; top: 0; right: 0; border-style: solid; border-width: 0 150px 150px 0; border-color: transparent #0ea5e9 transparent transparent; z-index: 1; }
        .tri-green { position: absolute; top: 0; right: 0; border-style: solid; border-width: 0 150px 150px 0; border-color: transparent #10b981 transparent transparent; z-index: 1; }
        .tri-purple { position: absolute; top: 0; right: 0; border-style: solid; border-width: 0 150px 150px 0; border-color: transparent #8b5cf6 transparent transparent; z-index: 1; }
        .a4-page * { position: relative; z-index: 2; }
        
        .a4-header-grid { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; margin-bottom: 25px; }
        .a4-header-left { flex: 1; padding-right: 15px; }
        .a4-header-right { min-width: 200px; text-align: right; }

        .a4-company-name { font-size: 15px; font-weight: 700; color: #0f172a; margin-bottom: 5px; margin-top: 15px; text-transform: uppercase; }
        .a4-company-details { font-size: 12px; color: #334155; line-height: 1.5; }
        .a4-doc-title { font-size: 24px; font-weight: 700; text-align: right; margin-bottom: 15px; }
        
        .a4-meta-table { width: 100%; font-size: 12px; }
        .a4-meta-table td { padding: 4px 0; border: none; }
        .a4-meta-table td:nth-child(1) { color: #475569; text-align: left; padding-right: 15px; white-space: nowrap; }
        .a4-meta-table td:nth-child(2) { color: #0f172a !important; font-weight: 600; text-align: right; white-space: nowrap; }
        
        .a4-customer-box { margin-bottom: 20px; font-size: 12px; color: #334155; }
        .a4-customer-title { font-weight: 700; margin-bottom: 4px; font-size: 13px; }
        .a4-customer-name { font-weight: 700; color: #0f172a; font-size: 14px; margin-bottom: 4px; }

        .a4-table { width: 100%; border-collapse: collapse; margin-bottom: 25px; font-size: 12px; }
        .a4-table th { border-top: 2px solid #cbd5e1; border-bottom: 2px solid #cbd5e1; padding: 10px 5px; text-align: right; color: #334155; font-weight: 600; }
        .a4-table th:nth-child(1), .a4-table th:nth-child(2) { text-align: left; }
        .a4-table td { border-bottom: 1px solid #f1f5f9; padding: 10px 5px; text-align: right; color: #0f172a; vertical-align: top; }
        .a4-table td:nth-child(1), .a4-table td:nth-child(2) { text-align: left; }
        
        .a4-totals-grid { display: grid; grid-template-columns: 1fr 280px; gap: 20px; }
        .a4-baht-text { font-size: 13px; color: #475569; align-self: flex-start; margin-top: 5px; }
        .a4-total-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13px; color: #475569; }
        .a4-total-row.grand { font-weight: 700; font-size: 14px; border-bottom: 1px solid #cbd5e1; padding-bottom: 8px; margin-bottom: 8px; }
        .a4-total-row.net { color: #0f172a; font-weight: 700; font-size: 14px; }

        .a4-signatures { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; text-align: center; margin-top: auto; }
        .a4-sig-box { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 120px; font-size: 12px; color: #475569; }
        .a4-sig-line { width: 200px; border-top: 1px solid #94a3b8; margin: 10px 0 8px 0; }
        .a4-sig-img { max-height: 50px; max-width: 150px; object-fit: contain; margin-bottom: -10px; mix-blend-mode: multiply; }
        
        .a4-footer-brand { text-align: right; font-size: 11px; color: #94a3b8; border-top: 1px solid #f1f5f9; padding-top: 10px; margin-top: 20px; }
        .a4-footer-brand span { font-weight: bold; font-family: 'Syne'; }

        /* Payment Block */
        .a4-bank-box { display: flex; align-items: center; justify-content: space-between; background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; margin-top: 20px; }
        .a4-bank-logo { width: 50px; height: 50px; border-radius: 50%; background: #f59e0b; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 24px; font-weight: bold; flex-shrink: 0; }
        .a4-bank-info { font-size: 14px; color: #475569; flex: 1; margin-left: 20px; }
        .a4-bank-acc { font-size: 18px; font-weight: 700; color: #0f172a; margin-bottom: 4px; }
        .a4-qr { width: 110px; height: 110px; flex-shrink: 0; object-fit: contain; border:1px solid #e2e8f0; border-radius:8px; padding:4px;}

        /* PRINT CONFIGURATION */
        @media print {
            @page { size: A4; margin: 0; }
            body { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; background: #fff !important; margin: 0; padding: 0; }
            .app-container, .modal-overlay, .toast-container, .public-toolbar { display: none !important; }
            #print-area { display: block !important; position: static; width: 100%; background: none; }
            .a4-wrapper { gap: 0; }
            .a4-page { box-shadow: none !important; margin: 0 !important; border-radius: 0 !important; width: 210mm !important; height: 297mm !important; page-break-after: always; page-break-inside: avoid; transform: none !important; }
            .a4-page:last-child { page-break-after: auto; }
        }

        /* 📱 Mobile Adjustments */
        @media (max-width: 768px) {
            .sidebar { position:fixed; left:-260px; height:100%; width:260px; box-shadow:5px 0 25px rgba(0,0,0,0.5); }
            .sidebar.open { left:0; transform:translateX(0); }
            .menu-toggle { display:block; } .mobile-close-menu { display:block; }
            .topbar { padding:0 16px; height:60px; min-height:60px; } .content { padding:16px; } .card { padding:16px; }
            .topbar-actions .btn { font-size:12px; padding:6px 10px; }
            
            .line-item-row { flex-direction:column; align-items:stretch; position:relative; }
            .line-item-row .num, .line-item-row .price, .line-item-row .discount { text-align:left; }
            .line-item-row .total { text-align:right; margin-top:8px; color:var(--accent); font-size:16px; width:100%; }
            .line-item-row .del { position:absolute; top:8px; right:8px; width:auto; padding:6px 12px; }
            
            .toast-container { left:16px; right:16px; bottom:16px; } .toast { width:100%; box-sizing:border-box; }
            .modal-box { width:95%; max-height:95vh; border-radius:12px; padding: 16px;} .modal-lg .modal-body { padding: 10px; }
            
            /* Responsive A4 Scale */
            .a4-wrapper { transform: scale(0.42); margin-bottom: -160%; }
            .public-toolbar { flex-direction:column; gap:10px; text-align:center; padding: 15px !important; }
        }
    </style>
</head>
<body>

<div class="app-container" id="app-root">
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleMobileMenu()"></div>

    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <div>
                <div class="logo-mark">BizFlow</div>
                <div class="logo-sub">Enterprise Accounting</div>
            </div>
            <button class="mobile-close-menu" onclick="toggleMobileMenu()">×</button>
        </div>
        <div class="nav-list" id="nav"></div>
        <div class="sidebar-footer">
            <div class="avatar" id="sidebar-avatar"><span id="sidebar-avatar-text">T</span><img id="sidebar-avatar-img" src="" alt="logo"></div>
            <div class="user-info">
                <div><div class="user-name" id="display-user-name">Company</div><div class="user-role">Administrator</div></div>
                <button class="theme-btn" onclick="toggleTheme()" id="theme-icon">🌙</button>
            </div>
        </div>
    </nav>

    <!-- MAIN -->
    <div class="main-view">
        <div class="topbar">
            <div class="topbar-left">
                <button class="menu-toggle" onclick="toggleMobileMenu()">☰</button>
                <div class="page-title" id="page-title">Dashboard</div>
            </div>
            <div class="topbar-actions" style="display:flex; gap:8px; align-items:center;">
                <button class="btn btn-teal btn-sm" onclick="setPage('doc-create', 'QT')">+ เสนอราคา</button>
                <button class="btn btn-primary btn-sm" onclick="setPage('doc-create', 'INV')">+ แจ้งหนี้</button>
            </div>
        </div>
        <div class="content" id="content"></div>
    </div>
</div>

<!-- GLOBAL MODAL -->
<div class="modal-overlay" id="modal"><div class="modal-box" id="modal-box"></div></div>

<!-- PRINT AREA -->
<div id="print-area" style="display:none;"></div>

<!-- TOASTS -->
<div class="toast-container" id="toasts"></div>

<script>
/* ==========================================
   0. ENCODE/DECODE HELPERS (FOR PUBLIC LINK)
   ========================================== */
function utoa(str) { return window.btoa(unescape(encodeURIComponent(str))); }
function atou(str) { return decodeURIComponent(escape(window.atob(str))); }

/* ==========================================
   1. DATABASE, DATA MODEL & THEME
   ========================================== */
const NAV_ITEMS = [
    { id: "dashboard", icon: "◈", label: "หน้าแรก (Dashboard)" },
    { id: "customers", icon: "◉", label: "ลูกค้า (Customers)" },
    { id: "products", icon: "⬡", label: "สินค้า (Products)" },
    { id: "docs-QT", icon: "◧", label: "ใบเสนอราคา (Quotations)" },
    { id: "docs-INV", icon: "◨", label: "ใบแจ้งหนี้ (Invoices)", notif: true },

function formatMoney(num) { return Number(num).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function generateId(prefix) { const d = new Date(); return prefix + d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(Math.floor(Math.random()*1000)).padStart(3,'0'); }
function showToast(msg, isLink = false) { const box = document.getElementById('toasts'); const t = document.createElement('div'); t.className = 'toast'; t.innerHTML = `${isLink ? '🔗' : '✅'} <span>${msg}</span>`; box.appendChild(t); setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 3000); }
function toggleMobileMenu() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebar-overlay').classList.toggle('active'); }

function getStatusBadge(s, type) {
    const map = { draft: ["bg-gray","ฉบับร่าง"], sent: ["bg-teal","ส่งแล้ว"], unpaid: ["bg-yellow","รอชำระเงิน"], paid: ["bg-green", type==='RE'?"รับเงินแล้ว":"ชำระแล้ว"], overdue: ["bg-red","เกินกำหนดชำระ"] };
    const [cls, label] = map[s] || ["bg-gray", s]; return `<span class="badge ${cls}">${label}</span>`;
}

function ThaiBahtText(amount) {
    if (amount === 0) return '(ศูนย์บาทถ้วน)';
    let str = parseFloat(Math.abs(amount)).toFixed(2).toString();
    const t = ['','สิบ','ร้อย','พัน','หมื่น','แสน','ล้าน'];
    const n = ['','หนึ่ง','สอง','สาม','สี่','ห้า','หก','เจ็ด','แปด','เก้า'];
    let parts = str.split('.'); let baht = parts[0], satang = parts[1];
    function convert(numStr) {
        let res = '';
        for (let i = 0; i < numStr.length; i++) {
            let digit = parseInt(numStr.charAt(i)); let pos = numStr.length - i - 1;
            if (digit !== 0) {
                if (pos === 1 && digit === 1) res += 'สิบ'; else if (pos === 1 && digit === 2) res += 'ยี่สิบ';
                else if (pos === 0 && digit === 1 && numStr.length > 1 && numStr.charAt(numStr.length-2) !== '0') res += 'เอ็ด';
                else res += n[digit] + t[pos];
            }
        } return res;
    }
    let resText = convert(baht) + 'บาท';
    if (satang === '00') resText += 'ถ้วน'; else resText += convert(satang) + 'สตางค์';
    return `(${amount < 0 ? 'ลบ' : ''}${resText})`;
}

function getCurrentFormattedDate() {
    const d = new Date(); return String(d.getDate()).padStart(2, '0') + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + d.getFullYear();
}

function processPayment(invId) {
    const inv = DB.documents.find(d => d.id === invId); if(!inv) return;
    if(!confirm(`ยืนยันรับชำระเงินยอด ฿${formatMoney(inv.total)} จาก ${DB.customers.find(c=>c.id===inv.customerId)?.name}?`)) return;
    inv.status = 'paid';
    const newRe = JSON.parse(JSON.stringify(inv)); newRe.id = generateId('RE'); newRe.type = 'RE'; newRe.status = 'paid'; newRe.date = getCurrentFormattedDate();
    DB.documents.push(newRe); saveDB(); showToast(`รับชำระเงินเรียบร้อย ออกใบเสร็จ ${newRe.id} แล้ว`); setPage('docs-RE');
}

function renderFormItemsUIHelper() { document.getElementById('form-items-container').innerHTML = renderFormItems(); updateFormTotals(); }

function removeFormItem(idx) { draftDoc.items.splice(idx, 1); renderFormItemsUIHelper(); }
function onSelectFormProduct(idx, pId) { const p = DB.products.find(x=>x.id===pId); if(p) { draftDoc.items[idx].productId = p.id; draftDoc.items[idx].name = p.name; draftDoc.items[idx].price = p.price; renderFormItemsUIHelper(); } }

function updateFormTotals() {
    let rawTotal = draftDoc.items.reduce((s,i)=>s+((i.qty*i.price)-i.discount), 0);
    let subtotal = rawTotal; let vat = 0;
    if(draftDoc.vatRate === 7) vat = rawTotal * 0.07;
    let wht = subtotal * (draftDoc.whtRate / 100);
    let grandTotal = subtotal + vat - wht;
    draftDoc.subtotal = subtotal; draftDoc.vat = vat; draftDoc.wht = wht; draftDoc.total = grandTotal;

    const box = document.getElementById('form-totals');
    if(box) box.innerHTML = `<div style="display:flex; justify-content:space-between; margin-bottom:8px; color:var(--muted)"><span>รวมเป็นเงิน</span><span>฿${formatMoney(subtotal)}</span></div><div style="display:flex; justify-content:space-between; margin-bottom:8px; color:var(--muted)"><span>ภาษีมูลค่าเพิ่ม (${draftDoc.vatRate}%)</span><span>฿${formatMoney(vat)}</span></div><div style="display:flex; justify-content:space-between; margin-bottom:12px; color:var(--red)"><span>หัก ณ ที่จ่าย (${draftDoc.whtRate}%)</span><span>- ฿${formatMoney(wht)}</span></div><div style="display:flex; justify-content:space-between; font-size:18px; font-weight:700; border-top:1px dashed var(--border); padding-top:16px; color:var(--text)"><span>ยอดชำระสุทธิ</span><span>฿${formatMoney(grandTotal)}</span></div>`;

function previewDraft() {
    if(!draftDoc.customerId) return alert("กรุณาเลือกลูกค้าก่อน");
    const validItems = draftDoc.items.filter(i=>i.price > 0 && i.name); if(validItems.length === 0) return alert("กรุณาเพิ่มรายการสินค้าอย่างน้อย 1 รายการ");
    let tempDoc = JSON.parse(JSON.stringify(draftDoc)); tempDoc.id = "PREVIEW-001"; tempDoc.items = validItems; tempDoc.isDraft = true; openPreviewData(tempDoc);
}

function saveDraftDoc() {
    if(!draftDoc.customerId) return alert('กรุณาเลือกลูกค้า');
    const validItems = draftDoc.items.filter(i=>i.price > 0 && i.name); if(validItems.length === 0) return alert('กรุณาเพิ่มรายการอย่างน้อย 1 รายการ');
    let newDoc = JSON.parse(JSON.stringify(draftDoc));
    newDoc.id = generateId(newDoc.type); newDoc.items = validItems; newDoc.status = (newDoc.type === 'QT' || newDoc.type === 'BL') ? 'sent' : (newDoc.type === 'RE' ? 'paid' : 'unpaid');

// 🌐 SHARE LINK FEATURE (Standalone Web Print)
function copyShareLink(id) { 
    const doc = DB.documents.find(d=>d.id === id);
    const cus = DB.customers.find(c=>c.id === doc.customerId) || {name:'-', phone:'-', taxId:'-'};
    
    // To prevent URL Too Long errors, we remove heavy base64 images from the shared payload.
    const shareComp = { ...DB.settings, logo: '', signature: '', qrCode: '' };
    
    const payload = { doc, cus, comp: shareComp };
    const encodedData = utoa(JSON.stringify(payload));
    const shareUrl = window.location.origin + window.location.pathname + '?public_doc=' + encodedData;

    const tempInput = document.createElement("input"); 
    tempInput.value = shareUrl; 
    document.body.appendChild(tempInput); 
    tempInput.select(); 
    document.execCommand("copy"); 
    document.body.removeChild(tempInput); 
    
    showToast(`คัดลอกลิงก์เรียบร้อย! ส่งให้ลูกค้าเปิดดูบนเว็บและสั่งปริ้นได้ทันทีโดยไม่ต้องล็อกอิน`, true); 
}

function printInvoice(id) { 
    const doc = DB.documents.find(d=>d.id === id); 
    const p = document.getElementById('print-area'); 
    p.innerHTML = `<div class="a4-wrapper">${generateInvoiceHTML(doc)}</div>`; 
    setTimeout(() => { window.print(); }, 300); 
}

                <div class="form-group"><label>ชื่อบริษัท / ร้านค้า</label><input id="s-name" class="form-control" value="${comp.companyName}"></div>
                <div class="form-group"><label>เลขผู้เสียภาษี</label><input id="s-tax" class="form-control" value="${comp.taxId}"></div>
                <div class="form-group"><label>ที่อยู่</label><textarea id="s-addr" class="form-control" rows="3">${comp.address}</textarea></div>
                <div class="form-group"><label>ชื่อผู้ออกเอกสาร</label><input id="s-issuer" class="form-control" value="${comp.issuerName}"></div>
            </div>
            <div>
                <div class="card" style="margin-bottom:16px;">
                    <span class="section-title">ข้อมูลธนาคาร & QR Code (รับโอนเงิน)</span>
                    <div class="form-group" style="margin-bottom:20px;"><label>QR Code รับเงิน (อัปโหลด)</label><div style="display:${comp.qrCode?'block':'none'}; background:#fff; border:1px solid var(--border); border-radius:8px; padding:4px; margin-bottom:8px; width:100px;"><img id="qr-preview" src="${comp.qrCode}" style="width:100%; height:90px; object-fit:contain;"></div><input type="file" accept="image/*" class="form-control" style="padding:8px; font-size:11px;" onchange="previewUpload(this, 'qr-preview', 'qr')"></div>
                    <div class="form-group"><label>ชื่อธนาคาร</label><input id="s-bname" class="form-control" value="${comp.bankName}"></div>
                    <div class="form-group"><label>เลขบัญชี</label><input id="s-bacc" class="form-control" value="${comp.bankAcc}"></div>
                    <div class="grid-2"><div class="form-group"><label>สาขา</label><input id="s-bbranch" class="form-control" value="${comp.bankBranch}"></div><div class="form-group"><label>ชื่อบัญชี</label><input id="s-bowner" class="form-control" value="${comp.bankOwner}"></div></div>
                </div>
                <button class="btn btn-primary" style="width:100%; justify-content:center; padding:12px; font-size:15px;" onclick="saveSettings()">💾 บันทึกการตั้งค่า</button>
            </div>
        </div>
    `;
}

let tempLogo = DB.settings.logo, tempSig = DB.settings.signature, tempQr = DB.settings.qrCode;
function previewUpload(input, imgId, type) { 
    if (input.files && input.files[0]) { 
        const reader = new FileReader(); 
        reader.onload = function(e) { 
            if(type === 'logo') DB.settings.logo = e.target.result; 
            if(type === 'sig') DB.settings.signature = e.target.result; 
            if(type === 'qr') DB.settings.qrCode = e.target.result; 
            document.getElementById(imgId).src = e.target.result; document.getElementById(imgId).parentElement.style.display = 'block'; 
        }; reader.readAsDataURL(input.files[0]); 
    } 
}
function saveSettings() { 
    DB.settings.companyName = document.getElementById('s-name').value; 
    DB.settings.taxId = document.getElementById('s-tax').value; 
    DB.settings.address = document.getElementById('s-addr').value; 
    DB.settings.issuerName = document.getElementById('s-issuer').value;
    DB.settings.bankName = document.getElementById('s-bname').value; 
    DB.settings.bankAcc = document.getElementById('s-bacc').value; 
    DB.settings.bankBranch = document.getElementById('s-bbranch').value; 
    DB.settings.bankOwner = document.getElementById('s-bowner').value; 
    saveDB(); showToast('บันทึกสำเร็จ'); renderSidebar(); 
}

// Inline & Modal Customers/Products
let isInlineAdd = false;
function openCustomerModal(inline = false) { isInlineAdd = inline; showModal(`<div class="modal-header"><span>เพิ่มลูกค้า</span><button class="modal-close" onclick="closeModal()">×</button></div><div class="modal-body"><div class="form-group"><label>ชื่อลูกค้า *</label><input id="c-name" class="form-control"></div><div class="form-group"><label>เลขผู้เสียภาษี</label><input id="c-tax" class="form-control"></div><div class="form-group"><label>เบอร์โทร</label><input id="c-phone" class="form-control"></div><button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="saveCustomer()">บันทึก</button></div>`); }
function saveCustomer() { 
    const name = document.getElementById('c-name').value; if(!name) return alert('กรอกชื่อลูกค้า'); 
    const newCus = { id: generateId('C'), name, taxId: document.getElementById('c-tax').value, phone: document.getElementById('c-phone').value };
    DB.customers.push(newCus); saveDB(); closeModal(); showToast('บันทึกลูกค้าแล้ว');
    if(isInlineAdd && document.getElementById('form-cus')) { document.getElementById('form-cus').innerHTML += `<option value="${newCus.id}">${newCus.name}</option>`; document.getElementById('form-cus').value = newCus.id; draftDoc.customerId = newCus.id; } else { setPage('customers'); }
}
function deleteCustomer(id) { if(confirm('ลบลูกค้านี้?')) { DB.customers = DB.customers.filter(c=>c.id!==id); saveDB(); setPage('customers'); } }

function openProductModal() { showModal(`<div class="modal-header"><span>เพิ่มสินค้า</span><button class="modal-close" onclick="closeModal()">×</button></div><div class="modal-body"><div class="form-group"><label>ชื่อ *</label><input id="p-name" class="form-control"></div><div class="form-group"><label>ราคา *</label><input id="p-price" type="number" class="form-control" value="0"></div><button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="saveProduct()">บันทึก</button></div>`); }
function saveProduct() { const name = document.getElementById('p-name').value, price = document.getElementById('p-price').value; if(!name) return alert('กรอกชื่อ'); DB.products.push({ id: generateId('P'), name, price: Number(price) }); saveDB(); closeModal(); setPage('products'); showToast('บันทึกสินค้าแล้ว'); }
function deleteProduct(id) { if(confirm('ลบสินค้านี้?')) { DB.products = DB.products.filter(p=>p.id!==id); saveDB(); setPage('products'); } }

function showModal(html, isLarge = false) { const box = document.getElementById('modal-box'); box.className = 'modal-box' + (isLarge ? ' modal-lg' : ''); box.innerHTML = html; document.getElementById('modal').classList.add('active'); }
function closeModal() { document.getElementById('modal').classList.remove('active'); }

                .public-title { color: #f8fafc; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; display:flex; align-items:center; gap:8px;}

            </style>

                <button class="public-btn" onclick="window.print()">🖨️ พิมพ์เอกสาร / บันทึก PDF</button>

    }
} else {
    // NORMAL APP MODE
    setPage('dashboard');
}
